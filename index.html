<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Desk - Free Professional PDF Invoice Generator</title>
  
  <!-- SEO & Open Graph Metadata -->
  <meta name="description" content="Create professional PDF invoices online in under 60 seconds. Fully client-side, secure, offline-first invoice generator tool with multiple modern templates.">
  <meta name="keywords" content="invoice generator, free invoice generator, online invoice maker, invoice template, create invoice online, business invoice generator, professional invoice maker, invoice creator, invoice builder, printable invoice, invoice pdf generator, custom invoice maker, sales invoice generator, tax invoice generator, VAT invoice generator, GST invoice generator">
  <meta property="og:title" content="Invoice Desk - Professional Invoice Generator">

  <!-- React, ReactDOM, and Babel CDNs for in-browser JSX compilation -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS CDN -->

  <!-- Tailwind Configuration for Dark Mode -->

    tailwind.config = {
      darkMode: 'class'

  <style>
    /* Custom styles and scrollbar adjustments */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @media print {
      body, html {
        background-color: #ffffff !important;
        color: #000000 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      #invoice-sheet {
        box-shadow: none !important;
        border: none !important;
        max-width: 100% !important;

        margin: 0 !important;

</head>
<body>

  <div id="root"></div>

  <!-- React Application Scripts -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ==========================================
    // CUSTOM SVG ICONS (No external dependencies)
    // ==========================================
    const Icons = {
      Plus: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v12m6-6H6" />
        </svg>
      ),
      Trash: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Duplicate: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
        </svg>
      ),
      Upload: () => (
        <svg className="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
      ),
      Download: () => (
        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
      ),
      Print: () => (
        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-3a2 2 0 00-2-2H9a2 2 0 00-2 2v3a2 2 0 002 2zm5-17h-2a2 2 0 00-2 2v3h6V4a2 2 0 00-2-2z" />
        </svg>
      ),
      Refresh: () => (
        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
        </svg>
      ),
      Sun: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      ),
      Moon: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      ),
      Check: () => (
        <svg className="w-5 h-5 text-emerald-500 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />
        </svg>
      ),
      Brush: () => (
        <svg className="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
      ),
      Eye: () => (
        <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      )
    };

    const TEMPLATES = [
      { id: 'professional', name: 'Professional', bg: 'bg-slate-50', primary: 'text-slate-900', accent: 'bg-indigo-600', border: 'border-slate-300' },
      { id: 'modern', name: 'Modern Theme', bg: 'bg-teal-50/30', primary: 'text-teal-950', accent: 'bg-teal-600', border: 'border-teal-200' },
      { id: 'minimal', name: 'Minimalist Black', bg: 'bg-neutral-50', primary: 'text-neutral-900', accent: 'bg-neutral-900', border: 'border-neutral-300' },
      { id: 'corporate', name: 'Corporate Deep', bg: 'bg-blue-50/40', primary: 'text-blue-950', accent: 'bg-blue-800', border: 'border-blue-300' },
      { id: 'creative', name: 'Creative Hue', bg: 'bg-purple-50/50', primary: 'text-purple-950', accent: 'bg-gradient-to-r from-purple-600 to-pink-600', border: 'border-purple-200' },
      { id: 'blueTheme', name: 'Royal Blue', bg: 'bg-sky-50/30', primary: 'text-sky-950', accent: 'bg-sky-600', border: 'border-sky-300' },
      { id: 'darkTheme', name: 'Classic Dark', bg: 'bg-slate-900', primary: 'text-white', accent: 'bg-emerald-500', border: 'border-slate-700' },
      { id: 'elegant', name: 'Elegant Serif', bg: 'bg-stone-50', primary: 'text-stone-900', accent: 'bg-amber-800', border: 'border-stone-300', font: 'font-serif' },
      { id: 'startup', name: 'Startup Bold', bg: 'bg-violet-50/40', primary: 'text-violet-950', accent: 'bg-violet-600', border: 'border-violet-300' },
      { id: 'freelancer', name: 'Freelancer Green', bg: 'bg-emerald-50/30', primary: 'text-emerald-950', accent: 'bg-emerald-600', border: 'border-emerald-200' },
    ];

    const CURRENCIES = [
      { code: 'USD', symbol: '$', label: 'US Dollar ($)' },
      { code: 'EUR', symbol: '€', label: 'Euro (€)' },
      { code: 'GBP', symbol: '£', label: 'British Pound (£)' },
      { code: 'CAD', symbol: 'C$', label: 'Canadian Dollar (C$)' },
      { code: 'AUD', symbol: 'A$', label: 'Australian Dollar (A$)' },
      { code: 'AED', symbol: 'د.إ', label: 'UAE Dirham (AED)' },
      { code: 'SAR', symbol: 'ر.س', label: 'Saudi Riyal (SAR)' },
      { code: 'INR', symbol: '₹', label: 'Indian Rupee (₹)' },
      { code: 'PKR', symbol: '₨', label: 'Pakistani Rupee (₨)' },
      { code: 'QAR', symbol: 'ر.ق', label: 'Qatari Riyal (QAR)' },
      { code: 'KWD', symbol: 'د.ك', label: 'Kuwaiti Dinar (KWD)' },
      { code: 'BHD', symbol: '.د.ب', label: 'Bahraini Dinar (BHD)' },
      { code: 'OMR', symbol: 'ر.ع.', label: 'Omani Rial (OMR)' },
    ];

    function App() {
      // Navigation & Workspace State
      const [activeTab, setActiveTab] = useState('home'); // home | privacy | terms | disclaimer | contact
      const [darkMode, setDarkMode] = useState(false);
      const [previewMode, setPreviewMode] = useState(false);
      const [successToast, setSuccessToast] = useState('');

      // Form State: Business Details
      const [businessName, setBusinessName] = useState('My Business Corp');
      const [businessAddress, setBusinessAddress] = useState('123 Enterprise Way, Suite 500, Tech City');
      const [businessPhone, setBusinessPhone] = useState('+1 (555) 019-2834');
      const [businessEmail, setBusinessEmail] = useState('billing@mybusiness.com');
      const [businessWebsite, setBusinessWebsite] = useState('www.mybusiness.com');
      const [businessTaxId, setBusinessTaxId] = useState('VAT-992019348');
      const [businessLogo, setBusinessLogo] = useState('');

      // Form State: Customer Details
      const [customerName, setCustomerName] = useState('Acme Corporation');
      const [customerAddress, setCustomerAddress] = useState('789 Commerce Boulevard, Tower B, New York, NY 10001');
      const [customerEmail, setCustomerEmail] = useState('accounts@acme.com');
      const [customerPhone, setCustomerPhone] = useState('+1 (212) 555-8901');

      // Form State: Invoice Metadata
      const [invoiceNumber, setInvoiceNumber] = useState(`INV-${Date.now().toString().slice(-6)}`);
      const [issueDate, setIssueDate] = useState(new Date().toISOString().split('T')[0]);
      const [dueDate, setDueDate] = useState(() => {
        const d = new Date();
        d.setDate(d.getDate() + 30);
        return d.toISOString().split('T')[0];
      });
      const [currencyCode, setCurrencyCode] = useState('USD');
      const [paymentTerms, setPaymentTerms] = useState('Net 30 Days');

      // Items State
      const [items, setItems] = useState([
        { id: 1, name: 'Premium Cloud Consulting', description: 'Enterprise structural design & implementation', qty: 20, price: 150, taxRate: 15 },
        { id: 2, name: 'SaaS Platform Subscription', description: 'Pro License annual plan for enterprise users', qty: 1, price: 1200, taxRate: 5 },
      ]);

      // Tax and Discount Settings
      const [taxMode, setTaxMode] = useState('excluded'); // 'excluded' | 'included'
      const [discountType, setDiscountType] = useState('percent'); // 'percent' | 'fixed'
      const [discountValue, setDiscountValue] = useState(10);
      const [shippingCharge, setShippingCharge] = useState(50);
      const [notes, setNotes] = useState('Thank you for choosing My Business Corp. We appreciate your timely payment via Bank Transfer to Account # US90 1200 4500 1234 56.');

      // Signature Setup
      const [signatureType, setSignatureType] = useState('draw'); // draw | upload | text
      const [signatureImage, setSignatureImage] = useState('');
      const [signatureText, setSignatureText] = useState('Authorized Manager');
      const [isDrawing, setIsDrawing] = useState(false);
      const canvasRef = useRef(null);

      // Styling Setup
      const [currentTemplate, setCurrentTemplate] = useState('professional');

      // Dynamic calculations
      const currencySymbol = useMemo(() => {
        return CURRENCIES.find(c => c.code === currencyCode)?.symbol || '$';
      }, [currencyCode]);

      const calculations = useMemo(() => {
        let subtotal = 0;
        let taxTotal = 0;

        items.forEach(item => {
          const lineTotal = item.qty * item.price;
          subtotal += lineTotal;

          const itemTax = lineTotal * (item.taxRate / 100);
          taxTotal += itemTax;
        });

        let discountTotal = 0;
        if (discountType === 'percent') {
          discountTotal = subtotal * (discountValue / 100);
        } else {
          discountTotal = Math.min(discountValue, subtotal);
        }

        let grandTotal = 0;
        if (taxMode === 'excluded') {
          grandTotal = subtotal + taxTotal - discountTotal + Number(shippingCharge || 0);
        } else {
          grandTotal = subtotal - discountTotal + Number(shippingCharge || 0);
        }

        return {
          subtotal: Math.max(0, subtotal),
          taxTotal: Math.max(0, taxTotal),
          discountTotal: Math.max(0, discountTotal),
          grandTotal: Math.max(0, grandTotal),
        };
      }, [items, taxMode, discountType, discountValue, shippingCharge]);

      // Handle local storage synchronization & persistence
      useEffect(() => {
        const cachedData = localStorage.getItem('invoice_desk_draft');
        if (cachedData) {
          try {
            const parsed = JSON.parse(cachedData);
            setBusinessName(parsed.businessName || 'My Business Corp');
            setBusinessAddress(parsed.businessAddress || '');
            setBusinessPhone(parsed.businessPhone || '');
            setBusinessEmail(parsed.businessEmail || '');
            setBusinessWebsite(parsed.businessWebsite || '');
            setBusinessTaxId(parsed.businessTaxId || '');
            setBusinessLogo(parsed.businessLogo || '');
            setCustomerName(parsed.customerName || 'Acme Corporation');
            setCustomerAddress(parsed.customerAddress || '');
            setCustomerEmail(parsed.customerEmail || '');
            setCustomerPhone(parsed.customerPhone || '');
            setInvoiceNumber(parsed.invoiceNumber || '');
            setIssueDate(parsed.issueDate || '');
            setDueDate(parsed.dueDate || '');
            setCurrencyCode(parsed.currencyCode || 'USD');
            setPaymentTerms(parsed.paymentTerms || 'Net 30 Days');
            setItems(parsed.items || []);
            setTaxMode(parsed.taxMode || 'excluded');
            setDiscountType(parsed.discountType || 'percent');
            setDiscountValue(parsed.discountValue || 0);
            setShippingCharge(parsed.shippingCharge || 0);
            setNotes(parsed.notes || '');
            setSignatureImage(parsed.signatureImage || '');
            setSignatureType(parsed.signatureType || 'draw');
            setSignatureText(parsed.signatureText || 'Authorized Manager');
          } catch (e) {
            console.error('Failed restoring invoice cache', e);
          }
        }
      }, []);

      const saveToLocalStorage = () => {
        const payload = {
          businessName, businessAddress, businessPhone, businessEmail, businessWebsite, businessTaxId, businessLogo,
          customerName, customerAddress, customerEmail, customerPhone,
          invoiceNumber, issueDate, dueDate, currencyCode, paymentTerms,
          items, taxMode, discountType, discountValue, shippingCharge, notes,
          signatureImage, signatureType, signatureText
        };
        localStorage.setItem('invoice_desk_draft', JSON.stringify(payload));
      };

      useEffect(() => {
        saveToLocalStorage();
      }, [
        businessName, businessAddress, businessPhone, businessEmail, businessWebsite, businessTaxId, businessLogo,
        customerName, customerAddress, customerEmail, customerPhone,
        invoiceNumber, issueDate, dueDate, currencyCode, paymentTerms,
        items, taxMode, discountType, discountValue, shippingCharge, notes,
        signatureImage, signatureType, signatureText
      ]);

      // Signature Canvas Drawing Logic
      const startDrawing = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0].clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0].clientY) - rect.top;
        
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches?.[0].clientX) - rect.left;
        const y = (e.clientY || e.touches?.[0].clientY) - rect.top;
        
        ctx.lineTo(x, y);
        ctx.stroke();
        e.preventDefault();
      };

      const stopDrawing = () => {
        if (!isDrawing) return;
        setIsDrawing(false);
        const canvas = canvasRef.current;
        if (canvas) {
          setSignatureImage(canvas.toDataURL());
        }
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          setSignatureImage('');
        }
      };

      // Image Upload helpers
      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setBusinessLogo(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSignatureUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setSignatureImage(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      // Row operations
      const handleAddItem = () => {
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { id: newId, name: '', description: '', qty: 1, price: 0, taxRate: 0 }]);
      };

      const handleUpdateItem = (id, field, value) => {
        setItems(items.map(item => {
          if (item.id === id) {
            let processedValue = value;
            if (field === 'qty' || field === 'price' || field === 'taxRate') {
              processedValue = value === '' ? '' : Number(value);
            }
            return { ...item, [field]: processedValue };
          }
          return item;
        }));
      };

      const handleRemoveItem = (id) => {
        setItems(items.filter(item => item.id !== id));
      };

      const handleDuplicateItem = (item) => {
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { ...item, id: newId }]);
      };

      // Actions
      const handleReset = () => {
        if (window.confirm('Are you sure you want to reset all data? This will clear the current invoice.')) {
          setBusinessName('My Business Corp');
          setBusinessAddress('123 Enterprise Way, Suite 500, Tech City');
          setBusinessPhone('+1 (555) 019-2834');
          setBusinessEmail('billing@mybusiness.com');
          setBusinessWebsite('www.mybusiness.com');
          setBusinessTaxId('VAT-992019348');
          setBusinessLogo('');
          setCustomerName('');
          setCustomerAddress('');
          setCustomerEmail('');
          setCustomerPhone('');
          setInvoiceNumber(`INV-${Date.now().toString().slice(-6)}`);
          setIssueDate(new Date().toISOString().split('T')[0]);
          setDueDate(new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]);
          setCurrencyCode('USD');
          setPaymentTerms('Net 30 Days');
          setItems([{ id: 1, name: '', description: '', qty: 1, price: 0, taxRate: 0 }]);
          setTaxMode('excluded');
          setDiscountType('percent');
          setDiscountValue(0);
          setShippingCharge(0);
          setNotes('');
          setSignatureImage('');
          showToast('Invoice details reset successful.');
        }
      };

      const showToast = (msg) => {
        setSuccessToast(msg);
        setTimeout(() => setSuccessToast(''), 3500);
      };

      const handleCopyInvoice = () => {
        navigator.clipboard.writeText(JSON.stringify({
          businessName, businessAddress, businessPhone, businessEmail, businessWebsite, businessTaxId,
          customerName, customerAddress, customerEmail, customerPhone,
          invoiceNumber: `${invoiceNumber}-COPY`, issueDate, dueDate, currencyCode, paymentTerms,
          items, taxMode, discountType, discountValue, shippingCharge, notes, signatureImage, signatureType, signatureText
        }, null, 2));
        showToast('Invoice configuration copied to clipboard!');
      };

      const handlePrint = () => {
        window.print();
      };

      // Set Document Dark Mode Class
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      return (
        <div className={`min-h-screen transition-colors duration-200 ${darkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
          
          {/* Toast Alert */}
          {successToast && (
            <div className="fixed top-5 right-5 z-50 flex items-center bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl animate-bounce">
              <Icons.Check />
              <span>{successToast}</span>
            </div>
          )}

          {/* HEADER SECTION */}
          <header className="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-40 transition-colors duration-200 print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              
              {/* Logo / Tagline */}
              <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                <div className="h-10 w-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-sky-500 flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-indigo-500/20">
                  ID
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Invoice Desk</h1>
                  <p className="text-xs text-slate-500 dark:text-slate-400">Professional PDF Invoice Generator</p>
                </div>
              </div>

              {/* Navigation Items */}
              <nav className="hidden md:flex space-x-8 text-sm font-semibold text-slate-600 dark:text-slate-300">
                <button onClick={() => { setActiveTab('home'); setPreviewMode(false); }} className={`hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors ${activeTab === 'home' ? 'text-indigo-600 dark:text-indigo-400' : ''}`}>Home</button>
                <button onClick={() => setActiveTab('privacy')} className={`hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors ${activeTab === 'privacy' ? 'text-indigo-600 dark:text-indigo-400' : ''}`}>Privacy Policy</button>
